<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" type="text/css" href="css/styles.css">
<link rel="stylesheet" type="text/css" href="css/sticker.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demitard - Image Cropper</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html"><h1>Demitard</h1></a>
        </div>
        <div class="sticker-title">
            <h2>Image Cropper</h2>
        </div>
        <div class="sticker-workspace">
            <div id="upload-zone" class="upload-zone">
                <span class="upload-icon">&#128444;</span>
                <p>Drag & drop an image here</p>
                <label for="file-input">Choose File</label>
                <input type="file" id="file-input" accept="image/*">
            </div>

            <div id="cropper-section" class="cropper-section">
                <div class="aspect-ratio-picker">
                    <span class="picker-label">Aspect Ratio:</span>
                    <div class="ratio-buttons">
                        <button class="ratio-btn active" data-ratio="0">Free</button>
                        <button class="ratio-btn" data-ratio="1">1:1</button>
                        <button class="ratio-btn" data-ratio="1.3333">4:3</button>
                        <button class="ratio-btn" data-ratio="0.75">3:4</button>
                        <button class="ratio-btn" data-ratio="1.7778">16:9</button>
                        <button class="ratio-btn" data-ratio="0.5625">9:16</button>
                        <button class="ratio-btn" data-ratio="1.5">3:2</button>
                        <button class="ratio-btn" data-ratio="0.6667">2:3</button>
                    </div>
                </div>
                <div class="cropper-container-wrapper">
                    <img id="cropper-image" alt="Image to crop">
                </div>
                <p class="cropper-hint">Adjust the crop area, then hit "Crop"</p>
                <div class="sticker-actions">
                    <button id="crop-btn">Crop</button>
                    <button id="reset-btn">Cancel</button>
                </div>
            </div>

            <div id="preview-section" class="preview-section">
                <h3>Cropped Image</h3>
                <div class="sticker-preview">
                    <img id="preview-image" alt="Cropped preview">
                </div>
                <div class="export-actions">
                    <button id="download-btn">Download</button>
                    <button id="new-sticker-btn">Crop Another</button>
                </div>
            </div>
        </div>
        <div class="footer">
            <a href="index.html"><p>Back to Home</p></a>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script src="scripts/stickerMaker.js"></script>
</body>
</html>
